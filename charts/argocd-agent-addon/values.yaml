# Controller manager image settings
# For development (main branch): use "latest" tag
# For release branches: update tag to match the release version (e.g., "0.26.1")
image: quay.io/open-cluster-management/argocd-pull-integration
tag: latest
replicas: 1

# ArgoCD operator image.
# Authoritative version lives in Makefile ARGOCD_OPERATOR_IMAGE (injected into
# the Go binary via ldflags). These Helm defaults MUST match the Makefile value.
# The release workflow updates the tag automatically for tagged releases.
operatorImage: quay.io/argoprojlabs/argocd-operator
operatorImageTag: latest

# Principal service type: LoadBalancer for production (cloud LB),
# NodePort for local dev (e.g. kind) - override via --set principalServiceType=NodePort
principalServiceType: LoadBalancer

# Hub ArgoCD settings
global:
  argoCDOperatorNamespace: argocd-operator-system
  argoCDNamespace: argocd

# GitOpsCluster settings (will be created in argocd namespace)
gitOpsCluster:
  namespace: argocd
  name: gitops-cluster
  principalServerAddress: ""
  principalServerPort: ""
  mode: managed
  argoCDAgentAddon:
    agentNamespace: ""
    operatorNamespace: ""

# Controller settings  
controller:
  namespace: argocd
