apiVersion: apps.open-cluster-management.io/v1alpha1
kind: GitOpsCluster
metadata:
  name: gitops-cluster
  namespace: argocd
spec:
  placementRef:
    apiVersion: cluster.open-cluster-management.io/v1beta1
    kind: Placement
    name: placement
  argoCDAgentAddon:
    mode: managed
    managedArgoCD:
      resourceExclusions: |
        - apiGroups:
          - ""
          - discovery.k8s.io
          kinds:
          - Endpoints
          - EndpointSlice
        - apiGroups:
          - coordination.k8s.io
          kinds:
          - Lease
