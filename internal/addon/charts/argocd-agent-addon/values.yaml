# Values are dynamically set by the addon controller at runtime.
# The authoritative operator version is Makefile ARGOCD_OPERATOR_IMAGE, injected
# into the Go binary via ldflags at build time. These defaults exist only so
# Helm can lint/template the chart standalone during development.

operatorImage: quay.io/argoprojlabs/argocd-operator
operatorImageTag: latest

global:
  argoCDOperatorNamespace: argocd-operator-system
  argoCDNamespace: argocd
  argoCDAgent:
    mode: managed
    serverAddress: ""
    serverPort: ""
